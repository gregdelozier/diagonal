name: Deploy to Digital Ocean / diagonal.cortana.org

on:
  push:
    branches: [ 'production' ]
  workflow_dispatch:

env:
  HOST: diagonal.cortana.org
  USER: root
  TARGET: $USER@$HOST
  SSH_OPTIONS: -o LogLevel=ERROR -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no

jobs:
  deploy_to_server:
    runs-on: ubuntu-latest
    steps:          
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.ID_RSA }}
          name: id_rsa
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Get the repo code
        uses: actions/checkout@v2
        with: 
          repository: gregdelozier/diagonal

      - name: Ping the server
        run: |
          export RUN="ssh $SSH_OPTIONS $TARGET"
          $RUN 'ls -la'
          

